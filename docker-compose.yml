services:
  mysql:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: learning_platform
      MYSQL_USER: learning
      MYSQL_PASSWORD: learning
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/learning_platform?serverTimezone=UTC&characterEncoding=UTF-8
      DB_USERNAME: learning
      DB_PASSWORD: learning
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
