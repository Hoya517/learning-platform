spring:
  application:
    name: learning-platform
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/learning_platform?serverTimezone=UTC&characterEncoding=UTF-8}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:learning}
    password: ${DB_PASSWORD:learning}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
